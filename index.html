<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Logs - Admin Panel</title>
    <!-- Adicionando ícones para o visual profissional -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #050508;
            --surface: #111116;
            --accent: #007cf0;
            --accent-glow: rgba(0, 124, 240, 0.3);
            --admin: #ff4757;
            --success: #00e676;
            --text-main: #ffffff;
            --text-dim: #88888f;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --nav-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050508 100%);
            color: var(--text-main);
            height: 100vh;
            overflow-x: hidden;
        }

        /* Animações */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .screen { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; animation: fadeInUp 0.4s ease-out; }
        .active { display: block; }

        /* Login */
        .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box {
            background: var(--surface);
            padding: 45px;
            border-radius: 28px;
            border: 1px solid var(--border);
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: white;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.6); }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 10px 20px -5px var(--accent-glow); }

        /* NAVBAR PROFISSIONAL */
        .navbar {
            background: rgba(17, 17, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: var(--nav-height);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-logo i { color: var(--accent); font-size: 22px; }

        .nav-actions { display: flex; align-items: center; gap: 20px; }

        .session-badge {
            background: var(--glass);
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-indicator { width: 6px; height: 6px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        .btn-nav-admin {
            background: rgba(255, 71, 87, 0.1);
            color: var(--admin);
            border: 1px solid rgba(255, 71, 87, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-nav-admin:hover { background: var(--admin); color: white; }

        .btn-logout {
            color: var(--text-dim);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            padding: 8px;
        }
        .btn-logout:hover { color: white; }

        /* Estilos de Lista */
        .log-item, .staff-item {
            background: var(--surface);
            padding: 18px 25px;
            border-radius: 18px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 120px 1fr 140px;
            align-items: center;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .log-item:hover { border-color: var(--accent); background: #14141b; }

        .log-time { font-family: 'JetBrains Mono', monospace; color: var(--text-dim); font-size: 13px; }
        .log-user { color: var(--accent); font-weight: 700; font-size: 15px; }
        .log-char { 
            background: rgba(255, 179, 0, 0.1); 
            color: #ffb300; 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: 800; 
            text-align: center;
        }

        .admin-card {
            background: var(--surface);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .btn-delete {
            background: rgba(255, 71, 87, 0.1);
            color: var(--admin);
            border: none;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: 0.2s;
        }
        .btn-delete:hover { background: var(--admin); color: white; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="screen-login" class="login-container screen active">
        <div class="login-box">
            <div style="margin-bottom: 25px;">
                <i class="fa-solid fa-shield-halved" style="font-size: 40px; color: var(--accent);"></i>
            </div>
            <h2 style="font-weight: 800; margin-bottom: 5px;">Elite Terminal</h2>
            <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 30px;">Identifique-se para continuar</p>
            
            <input type="text" id="user-input" placeholder="Usuário">
            <input type="password" id="pass-input" placeholder="Senha">
            <button class="btn-primary" onclick="tentarLogin()">Acessar Painel</button>
            <p id="error-msg" style="color: var(--admin); margin-top: 15px; display: none; font-size: 13px; font-weight: 600;"></p>
        </div>
    </div>

    <!-- NAVBAR (Só aparece após login) -->
    <nav id="main-nav" class="navbar" style="display: none;">
        <div class="nav-logo">
            <i class="fa-solid fa-cube"></i>
            <span>ELITE<span style="color:var(--accent)">LOGS</span></span>
        </div>

        <div class="nav-actions">
            <div class="session-badge">
                <div class="status-indicator"></div>
                <span id="display-name">Carregando...</span>
            </div>
            
            <button id="admin-btn" class="btn-nav-admin" style="display:none;" onclick="mudarTela('screen-dash', 'screen-admin')">
                <i class="fa-solid fa-crown" style="margin-right: 5px;"></i> Dono
            </button>

            <button onclick="location.reload()" class="btn-logout">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </nav>

    <!-- DASHBOARD -->
    <div id="screen-dash" class="screen">
        <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
            <div>
                <h2 style="font-size: 28px; font-weight: 800; letter-spacing: -1px;">Feed de Atividade</h2>
                <p style="color: var(--text-dim); font-size: 14px;">Monitoramento de spawns em tempo real</p>
            </div>
        </div>
        <div id="log-list"></div>
    </div>

    <!-- PAINEL DO DONO -->
    <div id="screen-admin" class="screen">
        <div style="margin-top: 20px; margin-bottom: 30px;">
            <button onclick="mudarTela('screen-admin', 'screen-dash')" class="btn-logout" style="padding-left: 0;">
                <i class="fa-solid fa-arrow-left"></i> Voltar ao Feed
            </button>
            <h2 style="font-size: 28px; font-weight: 800; margin-top: 10px;">Gestão de Acessos</h2>
        </div>
        
        <div class="admin-card">
            <h4 style="margin-bottom: 15px;">Novo Membro da Staff</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr 150px; gap: 15px;">
                <input type="text" id="new-user" placeholder="Usuário">
                <input type="text" id="new-pass" placeholder="Senha">
                <button onclick="criarNovoUsuario()" class="btn-primary" style="margin-top: 10px; background: var(--success); color: #00331a;">Cadastrar</button>
            </div>
        </div>

        <h4 style="margin-bottom: 15px; color: var(--text-dim);">Contas Ativas</h4>
        <div id="staff-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onChildAdded, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://spawnlogs-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.tentarLogin = async () => {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            const err = document.getElementById('error-msg');

            if (user === "meow" && pass === "2013") {
                entrar("DONO");
                return;
            }

            const snap = await get(ref(db, 'staff_accounts/' + user));
            if (snap.exists() && snap.val().password === pass) {
                entrar(user.toUpperCase());
            } else {
                err.innerText = "Credenciais inválidas";
                err.style.display = "block";
            }
        };

        function entrar(cargo) {
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('screen-dash').classList.add('active');
            document.getElementById('display-name').innerText = cargo;
            
            if (cargo === "DONO") {
                document.getElementById('admin-btn').style.display = "block";
                carregarListaStaff();
            }
            carregarLogs();
        }

        window.criarNovoUsuario = async () => {
            const u = document.getElementById('new-user').value.trim();
            const p = document.getElementById('new-pass').value.trim();
            if (!u || !p) return alert("Preencha todos os campos!");
            await set(ref(db, 'staff_accounts/' + u), { password: p });
            document.getElementById('new-user').value = "";
            document.getElementById('new-pass').value = "";
        };

        window.excluirStaff = async (id) => {
            if(confirm(`Revogar acesso de ${id}?`)) {
                await remove(ref(db, 'staff_accounts/' + id));
            }
        };

        function carregarListaStaff() {
            onValue(ref(db, 'staff_accounts'), (snapshot) => {
                const list = document.getElementById('staff-list');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const id = child.key;
                    const div = document.createElement('div');
                    div.className = 'staff-item';
                    div.style.gridTemplateColumns = "1fr 1fr 100px";
                    div.innerHTML = `
                        <b style="color: white">@${id}</b>
                        <span style="color: var(--text-dim); font-family: monospace;">${child.val().password}</span>
                        <button class="btn-delete" onclick="excluirStaff('${id}')">Revogar</button>
                    `;
                    list.appendChild(div);
                });
            });
        }

        function carregarLogs() {
            const list = document.getElementById('log-list');
            onChildAdded(ref(db, 'spawn_logs'), (snap) => {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <span class="log-time">${new Date(data.timestamp*1000).toLocaleTimeString()}</span>
                    <span class="log-user">@${data.username}</span>
                    <span class="log-char">${data.character}</span>
                `;
                list.prepend(div);
            });
        }

        window.mudarTela = (e, m) => {
            document.getElementById(e).classList.remove('active');
            document.getElementById(m).classList.add('active');
        };
    </script>
</body>
</html>
