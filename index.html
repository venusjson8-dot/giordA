<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Logs - Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #050508;
            --surface: #111116;
            --accent: #007cf0;
            --accent-glow: rgba(0, 124, 240, 0.3);
            --admin: #ff4757;
            --success: #00e676;
            --text-main: #ffffff;
            --text-dim: #88888f;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050508 100%);
            color: var(--text-main);
            height: 100vh;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .screen { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; animation: fadeInUp 0.5s ease; }
        .active { display: block; }

        /* Login */
        .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box {
            background: var(--surface);
            padding: 45px;
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { filter: brightness(1.2); }

        nav {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 16px;
            margin: 20px 0 40px 0;
        }

        .btn-admin { background: var(--admin); width: auto; padding: 10px 20px; font-size: 13px; }
        .btn-back { background: transparent; border: 1px solid var(--border); width: auto; padding: 8px 20px; }

        /* Logs e Lista */
        .log-item, .staff-item {
            background: var(--surface);
            padding: 18px 25px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 120px 1fr 1fr;
            align-items: center;
            border: 1px solid var(--border);
        }

        .staff-item { grid-template-columns: 1fr 1fr 100px; }

        .log-char, .btn-del-staff {
            background: rgba(255, 71, 87, 0.1);
            color: var(--admin);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            text-align: center;
        }

        .log-char { background: rgba(255, 179, 0, 0.1); color: #ffb300; cursor: default; justify-self: end; }

        .admin-card {
            background: var(--surface);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="screen-login" class="login-container screen active">
        <div class="login-box">
            <h2>Elite Panel</h2>
            <p>Acesse o terminal</p>
            <input type="text" id="user-input" placeholder="Usuário">
            <input type="password" id="pass-input" placeholder="Senha">
            <button onclick="tentarLogin()">Entrar</button>
            <p id="error-msg" style="color: var(--admin); margin-top: 15px; display: none;"></p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="screen-dash" class="screen">
        <nav>
            <span style="font-size: 14px; color: var(--text-dim);">Sessão: <b id="display-name" style="color: white;">...</b></span>
            <div style="display:flex; gap:12px;">
                <button id="admin-btn" class="btn-admin" style="display:none;" onclick="mudarTela('screen-dash', 'screen-admin')">Painel do Dono</button>
                <button onclick="location.reload()" class="btn-back">Sair</button>
            </div>
        </nav>
        <h2 style="margin-bottom: 20px;">Logs de Atividade</h2>
        <div id="log-list"></div>
    </div>

    <!-- PAINEL DO DONO -->
    <div id="screen-admin" class="screen">
        <button onclick="mudarTela('screen-admin', 'screen-dash')" class="btn-back" style="margin-bottom: 30px;">← Voltar</button>
        
        <div class="admin-card">
            <h3>Criar Staff</h3>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <input type="text" id="new-user" placeholder="Usuário">
                <input type="text" id="new-pass" placeholder="Senha">
                <button onclick="criarNovoUsuario()" style="width: 200px; margin-top: 10px; background: var(--success); color: #000;">Salvar</button>
            </div>
        </div>

        <h3>Usuários Staff Ativos</h3>
        <p style="color: var(--text-dim); font-size: 12px; margin-bottom: 15px;">Abaixo estão todos que podem acessar os logs.</p>
        <div id="staff-list">
            <!-- Lista de staffs aqui -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onChildRemoved, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://spawnlogs-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LOGIN
        window.tentarLogin = async () => {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            const err = document.getElementById('error-msg');

            if (user === "meow" && pass === "2013") {
                entrar("DONO");
                return;
            }

            const snap = await get(ref(db, 'staff_accounts/' + user));
            if (snap.exists() && snap.val().password === pass) {
                entrar("STAFF: " + user);
            } else {
                err.innerText = "Acesso Negado";
                err.style.display = "block";
            }
        };

        function entrar(cargo) {
            document.getElementById('screen-login').classList.remove('active', 'login-container');
            document.getElementById('screen-dash').classList.add('active');
            document.getElementById('display-name').innerText = cargo;
            
            if (cargo === "DONO") {
                document.getElementById('admin-btn').style.display = "block";
                carregarListaStaff(); // Só carrega se for dono
            }
            carregarLogs();
        }

        // GERENCIAR STAFF (DONO)
        window.criarNovoUsuario = async () => {
            const u = document.getElementById('new-user').value;
            const p = document.getElementById('new-pass').value;
            if (!u || !p) return alert("Preencha tudo!");
            await set(ref(db, 'staff_accounts/' + u), { password: p });
            document.getElementById('new-user').value = "";
            document.getElementById('new-pass').value = "";
        };

        window.excluirStaff = async (id) => {
            if(confirm(`Remover acesso de ${id}?`)) {
                await remove(ref(db, 'staff_accounts/' + id));
            }
        };

        function carregarListaStaff() {
            const list = document.getElementById('staff-list');
            // onValue escuta qualquer mudança na lista de staffs
            onValue(ref(db, 'staff_accounts'), (snapshot) => {
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const id = child.key;
                    const data = child.val();
                    const div = document.createElement('div');
                    div.className = 'staff-item';
                    div.innerHTML = `
                        <b style="color: var(--accent)">@${id}</b>
                        <span style="color: var(--text-dim)">Senha: ${data.password}</span>
                        <button class="btn-del-staff" onclick="excluirStaff('${id}')">EXCLUIR</button>
                    `;
                    list.appendChild(div);
                });
            });
        }

        // LOGS
        function carregarLogs() {
            const list = document.getElementById('log-list');
            onChildAdded(ref(db, 'spawn_logs'), (snap) => {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <span class="log-time">${new Date(data.timestamp*1000).toLocaleTimeString()}</span>
                    <a style="color:var(--accent); font-weight:700;">@${data.username}</a>
                    <span class="log-char">${data.character}</span>
                `;
                list.prepend(div);
            });
        }

        window.mudarTela = (e, m) => {
            document.getElementById(e).classList.remove('active');
            document.getElementById(m).classList.add('active');
        };
    </script>
</body>
</html>
