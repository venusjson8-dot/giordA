<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Logs - Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #050508;
            --surface: #111116;
            --accent: #007cf0;
            --accent-glow: rgba(0, 124, 240, 0.3);
            --admin: #ff4757;
            --success: #00e676;
            --text-main: #ffffff;
            --text-dim: #88888f;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050508 100%);
            color: var(--text-main);
            height: 100vh;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Controle de Telas */
        .screen { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; animation: fadeInUp 0.5s ease; }
        .active { display: block; }

        /* Login Container */
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: var(--surface);
            padding: 45px;
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-box h2 { font-weight: 800; font-size: 24px; margin-bottom: 8px; letter-spacing: -0.5px; }
        .login-box p { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.2s;
            outline: none;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }

        nav {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 16px;
            margin: 20px 0 40px 0;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }

        .btn-admin { background: var(--admin); width: auto; padding: 10px 20px; font-size: 13px; }
        .btn-back { background: transparent; border: 1px solid var(--border); width: auto; padding: 8px 20px; }

        .log-grid-header {
            display: grid;
            grid-template-columns: 120px 1fr 1fr;
            padding: 0 20px 10px;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .log-item {
            background: var(--surface);
            padding: 18px 25px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 120px 1fr 1fr;
            align-items: center;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .log-item:hover { border-color: var(--accent); transform: scale(1.01); background: #16161d; }
        .log-time { font-family: 'JetBrains Mono', monospace; color: var(--text-dim); font-size: 13px; }
        .log-user { color: var(--accent); font-weight: 700; text-decoration: none; font-size: 15px; }
        .log-char { 
            background: rgba(255, 179, 0, 0.1); 
            color: #ffb300; 
            padding: 6px 14px; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: 800; 
            width: fit-content;
            justify-self: end;
        }

        .admin-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN (DESAPARECE APÓS LOGAR) -->
    <div id="screen-login" class="login-container screen active">
        <div class="login-box">
            <h2>Bem-vindo</h2>
            <p>Acesse o painel administrativo</p>
            <input type="text" id="user-input" placeholder="Usuário">
            <input type="password" id="pass-input" placeholder="Senha">
            <button onclick="tentarLogin()">Entrar no Sistema</button>
            <p id="error-msg" style="color: var(--admin); margin-top: 15px; font-weight: 600; display: none;"></p>
        </div>
    </div>

    <!-- DASHBOARD (APARECE APÓS LOGAR) -->
    <div id="screen-dash" class="screen">
        <nav>
            <div class="user-info">
                <div class="status-dot"></div>
                <span style="font-size: 14px; color: var(--text-dim);">Sessão Ativa: <b id="display-name" style="color: white;">...</b></span>
            </div>
            <div style="display:flex; gap:12px;">
                <button id="admin-btn" class="btn-admin" style="display:none;" onclick="mudarTela('screen-dash', 'screen-admin')">Painel do Dono</button>
                <button onclick="location.reload()" class="btn-back">Sair</button>
            </div>
        </nav>

        <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px;">Atividade em Tempo Real</h2>
        
        <div class="log-grid-header">
            <span>Horário</span>
            <span>Usuário Roblox</span>
            <span style="text-align: right;">Personagem</span>
        </div>
        <div id="log-list"></div>
    </div>

    <!-- PAINEL DO DONO -->
    <div id="screen-admin" class="screen">
        <button onclick="mudarTela('screen-admin', 'screen-dash')" class="btn-back" style="margin-bottom: 30px;">← Voltar ao Início</button>
        
        <div class="admin-card">
            <h2 style="margin-bottom: 10px; font-weight: 800;">Criar Novo Staff</h2>
            <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 30px;">O novo usuário terá acesso visual às logs de spawn.</p>
            
            <label style="font-size: 13px; font-weight: 700; color: var(--text-dim);">LOGIN DO STAFF</label>
            <input type="text" id="new-user" placeholder="Ex: moderador_01">
            
            <label style="font-size: 13px; font-weight: 700; color: var(--text-dim);">SENHA DE ACESSO</label>
            <input type="password" id="new-pass" placeholder="••••••••">
            
            <button onclick="criarNovoUsuario()" style="background: var(--success); color: #00331a;">Gerar Credenciais</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onChildAdded, set, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://spawnlogs-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // FUNÇÃO DE LOGIN
        window.tentarLogin = async () => {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            const err = document.getElementById('error-msg');

            // 1. Verifica Dono
            if (user === "meow" && pass === "2013") {
                entrar("DONO");
                return;
            }

            // 2. Verifica Staff no Banco
            const staffRef = ref(db, 'staff_accounts/' + user);
            const snap = await get(staffRef);
            if (snap.exists() && snap.val().password === pass) {
                entrar("STAFF: " + user);
            } else {
                err.innerText = "Credenciais Inválidas";
                err.style.display = "block";
                setTimeout(() => { err.style.display = "none"; }, 3000);
            }
        };

        // FUNÇÃO QUE FAZ O LOGIN ACONTECER
        function entrar(cargo) {
            // Remove a classe de container de login para não centralizar o dashboard
            document.getElementById('screen-login').classList.remove('login-container');
            
            // Troca as telas
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-dash').classList.add('active');
            
            document.getElementById('display-name').innerText = cargo;
            
            if (cargo === "DONO") {
                document.getElementById('admin-btn').style.display = "block";
            }
            
            carregarLogs();
        }

        window.criarNovoUsuario = async () => {
            const newUser = document.getElementById('new-user').value;
            const newPass = document.getElementById('new-pass').value;
            if (!newUser || !newPass) return alert("Preencha todos os campos.");

            try {
                await set(ref(db, 'staff_accounts/' + newUser), { password: newPass });
                alert("Usuário staff criado com sucesso!");
                document.getElementById('new-user').value = "";
                document.getElementById('new-pass').value = "";
            } catch(e) { alert("Erro ao salvar no banco."); }
        };

        window.mudarTela = (esconde, mostra) => {
            document.getElementById(esconde).classList.remove('active');
            document.getElementById(mostra).classList.add('active');
        };

        function carregarLogs() {
            const list = document.getElementById('log-list');
            const agora = Math.floor(Date.now() / 1000);
            
            onChildAdded(ref(db, 'spawn_logs'), (snap) => {
                const data = snap.val();
                if (agora - data.timestamp > 86400) {
                    remove(ref(db, 'spawn_logs/' + snap.key));
                    return;
                }

                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <span class="log-time">${new Date(data.timestamp*1000).toLocaleTimeString()}</span>
                    <a class="log-user" href="https://www.roblox.com/users/${data.userId}/profile" target="_blank">@${data.username}</a>
                    <span class="log-char">${data.character}</span>
                `;
                list.prepend(div);
            });
        }
    </script>
</body>
</html>
