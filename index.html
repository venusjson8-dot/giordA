<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Logs - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #050508;
            --surface: #111116;
            --accent: #007cf0;
            --accent-glow: rgba(0, 124, 240, 0.3);
            --admin: #ff4757;
            --success: #00e676;
            --text-main: #ffffff;
            --text-dim: #88888f;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --nav-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050508 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animações de Transição */
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* LOGIN (Ocupa a tela toda inicialmente) */
        #screen-login {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            background: var(--bg);
        }

        .login-box {
            background: var(--surface);
            padding: 45px;
            border-radius: 28px;
            border: 1px solid var(--border);
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: white;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        /* CONTEÚDO PRINCIPAL (Invisível até o login) */
        #main-wrapper { display: none; }

        /* NAVBAR PROFISSIONAL */
        .navbar {
            background: rgba(17, 17, 22, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: var(--nav-height);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo { font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .nav-logo i { color: var(--accent); }

        .nav-actions { display: flex; align-items: center; gap: 15px; }

        .session-badge {
            background: var(--glass);
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid var(--border);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-indicator { width: 6px; height: 6px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        .btn-nav-admin {
            background: rgba(255, 71, 87, 0.1);
            color: var(--admin);
            border: 1px solid rgba(255, 71, 87, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        /* GRID DE LOGS */
        .screen { padding: 40px 20px; max-width: 1100px; margin: 0 auto; display: none; }
        .screen.active { display: block; }

        .log-item {
            background: var(--surface);
            padding: 18px 25px;
            border-radius: 18px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 120px 1fr 140px;
            align-items: center;
            border: 1px solid var(--border);
        }

        .log-time { font-family: 'JetBrains Mono', monospace; color: var(--text-dim); font-size: 13px; }
        .log-user { color: var(--accent); font-weight: 700; }
        .log-char { background: rgba(255, 179, 0, 0.1); color: #ffb300; padding: 6px; border-radius: 8px; font-size: 11px; text-align: center; font-weight: 800; }

        .admin-card { background: var(--surface); padding: 30px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 30px; }
        .btn-delete { background: rgba(255, 71, 87, 0.1); color: var(--admin); border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN (DESAPARECE TOTALMENTE) -->
    <div id="screen-login">
        <div class="login-box">
            <i class="fa-solid fa-shield-halved" style="font-size: 40px; color: var(--accent); margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 5px;">Elite Access</h2>
            <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 30px;">Painel Restrito</p>
            
            <input type="text" id="user-input" placeholder="Usuário">
            <input type="password" id="pass-input" placeholder="Senha">
            <button class="btn-primary" onclick="tentarLogin()">Entrar</button>
            <p id="error-msg" style="color: var(--admin); margin-top: 15px; display: none; font-size: 13px;"></p>
        </div>
    </div>

    <!-- WRAPPER DO SISTEMA (SÓ APARECE APÓS LOGIN) -->
    <div id="main-wrapper">
        <nav class="navbar">
            <div class="nav-logo"><i class="fa-solid fa-cube"></i> ELITE<span>LOGS</span></div>
            <div class="nav-actions">
                <div class="session-badge"><div class="status-indicator"></div> <span id="display-name">USUÁRIO</span></div>
                <button id="admin-btn" class="btn-nav-admin" style="display:none;" onclick="mudarTela('screen-dash', 'screen-admin')">Dono</button>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--text-dim); cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </nav>

        <!-- FEED -->
        <div id="screen-dash" class="screen active fade-in">
            <h2 style="margin-bottom: 30px;">Atividade em Tempo Real</h2>
            <div id="log-list"></div>
        </div>

        <!-- ADMIN -->
        <div id="screen-admin" class="screen fade-in">
            <button onclick="mudarTela('screen-admin', 'screen-dash')" style="background:none; border:none; color:var(--text-dim); cursor:pointer; margin-bottom: 20px;"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
            <div class="admin-card">
                <h3>Cadastrar Staff</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr 150px; gap: 10px; margin-top: 15px;">
                    <input type="text" id="new-user" placeholder="Login">
                    <input type="text" id="new-pass" placeholder="Senha">
                    <button onclick="criarNovoUsuario()" class="btn-primary" style="margin-top:10px;">Salvar</button>
                </div>
            </div>
            <h3>Contas Staff</h3>
            <div id="staff-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onChildAdded, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://spawnlogs-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.tentarLogin = async () => {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            const err = document.getElementById('error-msg');

            if (user === "meow" && pass === "2013") {
                autorizar("DONO");
                return;
            }

            const snap = await get(ref(db, 'staff_accounts/' + user));
            if (snap.exists() && snap.val().password === pass) {
                autorizar(user.toUpperCase());
            } else {
                err.innerText = "Falha na autenticação";
                err.style.display = "block";
            }
        };

        function autorizar(cargo) {
            // 1. Remove o login da tela
            document.getElementById('screen-login').style.display = 'none';
            // 2. Mostra o sistema principal
            document.getElementById('main-wrapper').style.display = 'block';
            
            document.getElementById('display-name').innerText = cargo;
            if (cargo === "DONO") {
                document.getElementById('admin-btn').style.display = "block";
                carregarListaStaff();
            }
            carregarLogs();
        }

        window.criarNovoUsuario = async () => {
            const u = document.getElementById('new-user').value;
            const p = document.getElementById('new-pass').value;
            if (u && p) {
                await set(ref(db, 'staff_accounts/' + u), { password: p });
                alert("Staff adicionado!");
            }
        };

        window.excluirStaff = async (id) => {
            if(confirm(`Remover ${id}?`)) await remove(ref(db, 'staff_accounts/' + id));
        };

        function carregarListaStaff() {
            onValue(ref(db, 'staff_accounts'), (snapshot) => {
                const list = document.getElementById('staff-list');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const id = child.key;
                    const div = document.createElement('div');
                    div.className = 'log-item';
                    div.style.gridTemplateColumns = "1fr 1fr 100px";
                    div.innerHTML = `<b>@${id}</b> <span style="color:var(--text-dim)">${child.val().password}</span> <button class="btn-delete" onclick="excluirStaff('${id}')">Remover</button>`;
                    list.appendChild(div);
                });
            });
        }

        function carregarLogs() {
            const list = document.getElementById('log-list');
            onChildAdded(ref(db, 'spawn_logs'), (snap) => {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = 'log-item fade-in';
                div.innerHTML = `<span class="log-time">${new Date(data.timestamp*1000).toLocaleTimeString()}</span><span class="log-user">@${data.username}</span><span class="log-char">${data.character}</span>`;
                list.prepend(div);
            });
        }

        window.mudarTela = (e, m) => {
            document.getElementById(e).classList.remove('active');
            document.getElementById(m).classList.add('active');
        };
    </script>
</body>
</html>
